<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Pengaduan TIK - KPPN Masohi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --background-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #06b6d4 100%);
            --text-main: #1f2937;
            --text-light: #6b7280;
            --white: #ffffff;
            --border-color: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--background-gradient); background-attachment: fixed;
            color: var(--text-main); line-height: 1.6; display: flex;
            justify-content: center; align-items: center; min-height: 100vh; padding: 2rem 1rem;
        }

        .container {
            background-color: var(--white); max-width: 650px; width: 100%;
            border-radius: 16px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); overflow: hidden;
        }

        .header { background-color: rgba(37, 99, 235, 0.05); padding: 2.5rem 2rem; text-align: center; border-bottom: 1px solid var(--border-color); }
        .header h1 { color: var(--primary-color); font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .header p { color: var(--text-light); font-size: 0.95rem; }

        .form-container { padding: 2.5rem 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.95rem; }
        
        .form-control {
            width: 100%; padding: 0.75rem 1rem; font-size: 1rem;
            border: 2px solid var(--border-color); border-radius: 8px;
            transition: all 0.3s ease; background-color: #f9fafb; color: var(--text-main);
        }

        .form-control:focus { outline: none; border-color: var(--primary-color); background-color: var(--white); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        textarea.form-control { resize: vertical; min-height: 120px; }

        .row { display: flex; gap: 1.5rem; }
        .col { flex: 1; }

        .btn-submit {
            width: 100%; background-color: var(--primary-color); color: var(--white);
            padding: 1rem; font-size: 1.1rem; font-weight: 600; border: none;
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease; margin-top: 1rem;
        }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .footer { text-align: center; padding: 1.5rem; background-color: #f3f4f6; color: var(--text-light); font-size: 0.85rem; border-top: 1px solid var(--border-color); }

        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 0; }
            .header h1 { font-size: 1.5rem; }
            .form-container { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Layanan Pengaduan TIK</h1>
            <p>KPPN Masohi - Sampaikan kendala sarana dan prasarana Anda di sini.</p>
        </div>

        <div class="form-container">
            <form id="form-pengaduan">
                <div class="row">
                    <div class="col form-group">
                        <label>Nama Lengkap</label>
                        <input type="text" name="nama" class="form-control" placeholder="Masukkan nama Anda" required>
                    </div>
                    <div class="col form-group">
                        <label>NIP / NRP</label>
                        <input type="text" name="nip" class="form-control" placeholder="Masukkan NIP Anda" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label>Seksi / Subbagian</label>
                        <select name="seksi" class="form-control" required>
                            <option value="" disabled selected>Pilih Seksi/Subbagian</option>
                            <option value="Subbag Umum">Subbag Umum</option>
                            <option value="Seksi PD">Seksi PD</option>
                            <option value="Seksi MSKI">Seksi MSKI</option>
                            <option value="Seksi Vera">Seksi Vera</option>
                            <option value="Seksi Bank">Seksi Bank</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div class="col form-group">
                        <label>Kategori Kendala</label>
                        <select name="kategori" class="form-control" required>
                            <option value="" disabled selected>Pilih Kategori</option>
                            <option value="Jaringan / Internet">Jaringan / Internet</option>
                            <option value="Perangkat Keras (PC/Laptop/Printer)">Perangkat Keras (PC/Laptop/Printer)</option>
                            <option value="Aplikasi / Perangkat Lunak">Aplikasi / Perangkat Lunak</option>
                            <option value="Sistem Keamanan">Sistem Keamanan</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Deskripsi Kendala</label>
                    <textarea name="deskripsi" class="form-control" placeholder="Jelaskan kendala yang dialami secara detail..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Lampiran Foto/Screenshot (Opsional)</label>
                    <input type="file" id="lampiran" class="form-control" accept="image/*">
                    <small style="color: #6b7280; font-size: 0.8rem; margin-top: 5px; display: block;">*Format: JPG/PNG. Maksimal 3MB.</small>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">Kirim Pengaduan</button>
            </form>
        </div>

        <div class="footer">
            &copy; 2026 KPPN Masohi. Dikelola oleh Tim TIK.
        </div>
    </div>

    <script>
        // --- GANTI URL DI BAWAH INI DENGAN URL DARI LANGKAH 1 ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz1Uk1E7_s0XcjMyrjJG55fZczZXa3mWAq2ENiRruLkeZyS6elN2dnwy3osjloaueg/exec'; 
        
        const form = document.getElementById('form-pengaduan');
        const btnSubmit = document.getElementById('btn-submit');
        const fileInput = document.getElementById('lampiran');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            btnSubmit.innerHTML = 'Mengirim Data... Mohon Tunggu';
            btnSubmit.disabled = true;

            const formData = new FormData(form);
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Data = event.target.result.split(',')[1];
                    const urlParams = new URLSearchParams();
                    for (const pair of formData.entries()) {
                        urlParams.append(pair[0], pair[1]);
                    }
                    urlParams.append('fileData', base64Data);
                    urlParams.append('mimeType', file.type);
                    urlParams.append('fileName', file.name);

                    kirimKeServer(urlParams);
                };
                reader.readAsDataURL(file);
            } else {
                const urlParams = new URLSearchParams();
                for (const pair of formData.entries()) {
                    urlParams.append(pair[0], pair[1]);
                }
                kirimKeServer(urlParams);
            }
        });

        function kirimKeServer(dataParams) {
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', // INI KUNCI UTAMA AGAR LOLOS DI VERCEL
                body: dataParams,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(() => {
                // Karena no-cors, kita tidak menerima respon balik dari server. Kita asumsikan sukses.
                alert('Berhasil! Pengaduan Anda telah dikirim ke Tim TIK KPPN Masohi.');
                form.reset();
                btnSubmit.innerHTML = 'Kirim Pengaduan';
                btnSubmit.disabled = false;
            })
            .catch(error => {
                alert('Gagal mengirim data. Pastikan perangkat terhubung ke internet.');
                console.error('Error!', error);
                btnSubmit.innerHTML = 'Kirim Pengaduan';
                btnSubmit.disabled = false;
            });
        }
    </script>
</body>
</html>
